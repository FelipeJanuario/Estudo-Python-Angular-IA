<!-- Minha primeira página Angular -->

<div class="container">
  <h1>Hello, {{ title }}!</h1>
  <p class="subtitulo">Bem-vindo ao Angular 19. Esta é a minha primeira página.</p>

  <div class="card">
    <p class="contador-label">Número de cliques:</p>
    <p class="contador-valor">{{ contador }}</p>
    <div class="botoes">
      <button (click)="incrementar()">Clique aqui</button>
      <button class="resetar" (click)="resetar()">Resetar</button>
    </div>
  </div>
</div>

<!--
  CONCEITOS USADOS NESTA PÁGINA:
  - {{ title }}    -> interpolação: exibe o valor da propriedade 'title' do componente
  - {{ contador }} -> interpolação: exibe o valor da propriedade 'contador' do componente
  - (click)="..."  -> event binding: chama um método do componente ao clicar
-->

<router-outlet />
